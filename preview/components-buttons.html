<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
body { background: var(--bg2); }
.row-b { display:flex; flex-wrap: wrap; gap: 10px; align-items:center; }
.btn { display:inline-flex; align-items:center; gap:8px; padding: 10px 16px; font-family: var(--font-sans); font-weight:600; font-size:13px; cursor:pointer; transition: var(--transition-smooth); border: 1px solid transparent; border-radius:0;}
.btn:hover { box-shadow: var(--shadow-card-hover); }
.btn:active { transform: scale(.95); }
.btn.primary { background: var(--gx-primary); color: var(--gx-secondary-light); }
.btn.primary:hover { background: #0a2a55; }
.btn.secondary { background: var(--gx-secondary-light); color: var(--gx-primary); }
.btn.outline { border-color: var(--gx-border); background: #fff; color: var(--gx-primary); }
.btn.outline:hover { border-color: var(--gx-primary); }
.btn.ghost { background: transparent; color: var(--gx-primary); }
.btn.ghost:hover { background: rgba(12,49,99,.08); }
.btn.dark { background: var(--gx-primary-dark); color: #fff; }
.btn.gold { background: var(--gx-secondary-dark); color: #fff; }
.btn.icon { padding: 10px; }
.svg { width:14px; height:14px; }
.row-section + .row-section { margin-top: 12px; }
</style></head>
<body>
  <div class="eyebrow" style="margin-bottom:10px">Buttons</div>
  <div class="row-section row-b">
    <button class="btn primary">Primary CTA <span class="mono" style="font-size:11px;opacity:.7">→</span></button>
    <button class="btn secondary">Secondary</button>
    <button class="btn outline">Outline</button>
    <button class="btn ghost">Ghost</button>
    <button class="btn dark">Dark</button>
  </div>
  <div class="row-section row-b">
    <button class="btn primary" style="padding:8px 12px; font-size:12px;">SM</button>
    <button class="btn primary">DEFAULT</button>
    <button class="btn primary" style="padding:14px 28px; font-size:14px;">LG</button>
    <button class="btn primary icon" aria-label="icon">
      <svg class="svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    <button class="btn primary" disabled style="opacity:.5; cursor:not-allowed;">Disabled</button>
  </div>
</body></html>
