<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
body { background: var(--bg2); padding: 16px;}
.kpi-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
.kpi {
  position: relative; overflow: hidden;
  padding: 20px;
  display: flex; flex-direction: column; justify-content: space-between; min-height: 140px;
}
.kpi.dark { background: var(--gx-secondary-dark); color: #fff; border-bottom: 4px solid var(--gx-primary); }
.kpi.light { background: #fff; border: 1px solid var(--gx-border); color: var(--fg1); }
.kpi .top { display:flex; justify-content:space-between; align-items:flex-start; }
.kpi .lbl { font-size:10px; letter-spacing:.12em; text-transform:uppercase; font-weight:700; }
.kpi.dark .lbl { color: rgba(255,255,255,.5); }
.kpi.light .lbl { color: var(--gx-secondary-dark); opacity: .7; }
.kpi .ico { color: var(--gx-primary); }
.kpi.dark .ico { color: var(--gx-secondary-light); }
.kpi .val { font-family: var(--font-mono); font-weight: 900; letter-spacing:-0.02em; }
.kpi.dark .val { font-size: 32px; line-height: 1; }
.kpi.light .val { font-size: 28px; line-height: 1; color: var(--gx-primary-dark); }
.kpi .sub { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; font-weight: 600; }
.kpi.dark .sub { color: rgba(255,255,255,.4); }
.kpi.light .sub { color: var(--fg2); }
.bar-track { height: 4px; background: rgba(0,0,0,.08); margin-top: 12px; }
.bar-fill { height: 100%; background: var(--gx-primary); width: 87%; }
.deco { position: absolute; top:0; right:0; width: 50%; height:100%; background: linear-gradient(to left, rgba(255,255,255,.05), transparent); pointer-events:none; }
</style></head>
<body>
<div class="kpi-row">
  <div class="kpi dark">
    <div class="deco"></div>
    <div class="top">
      <span class="lbl">Volume Total (AUM)</span>
      <svg class="ico" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-9-9v9z"/><path d="M21 12a9 9 0 00-9-9v9z" fill="currentColor" opacity=".4"/></svg>
    </div>
    <div>
      <div class="val">R$&nbsp;1.247.580,00</div>
      <div class="sub" style="margin-top:6px">Ativos sob gestão · Escopo atual</div>
    </div>
  </div>
  <div class="kpi light">
    <div class="top">
      <span class="lbl">Meta do Mês</span>
      <svg class="ico" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
    </div>
    <div>
      <div style="display:flex; justify-content:space-between; align-items:flex-end;">
        <div>
          <div style="font-size:12px; font-weight:700;">Atual: R$ 1.084.380</div>
          <div class="sub">Meta: R$ 1.250.000</div>
        </div>
        <div style="display:flex; align-items:baseline; gap:2px;">
          <span class="val" style="font-size:36px;">87</span>
          <span style="font-weight:700; color:var(--fg2);">%</span>
        </div>
      </div>
      <div class="bar-track"><div class="bar-fill"></div></div>
    </div>
  </div>
</div>
</body></html>
