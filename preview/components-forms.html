<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
body { background: var(--bg2); }
.field { display:flex; flex-direction:column; gap:6px; margin-bottom: 14px; }
.field .lbl { font-size:10px; letter-spacing:.1em; text-transform:uppercase; font-weight:700; color: var(--gx-secondary-dark); }
.input, .select {
  width: 100%; height: 40px; padding: 0 12px; font-family: var(--font-sans); font-size:14px;
  border: 1px solid var(--gx-border); background: #fff; color: var(--fg1);
  outline: none; border-radius: 0; transition: var(--transition-smooth);
}
.input:focus, .select:focus { border-color: var(--gx-primary); box-shadow: 0 0 0 3px rgba(12,49,99,.15); }
.input::placeholder { color: #94a3b8; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.checkbox-row { display:flex; align-items:center; gap:10px; font-size:13px; }
.cb { width:16px; height:16px; border: 1.5px solid var(--gx-primary); display:inline-flex; align-items:center; justify-content:center; }
.cb.on { background: var(--gx-primary); }
.cb.on::after { content:""; width: 8px; height: 4px; border-left: 2px solid #fff; border-bottom: 2px solid #fff; transform: rotate(-45deg) translate(1px, -2px); }
</style></head>
<body>
  <div class="row">
    <div class="field">
      <span class="lbl">Cliente</span>
      <input class="input" placeholder="Buscar por nome ou CPF" />
    </div>
    <div class="field">
      <span class="lbl">Status</span>
      <select class="select"><option>Todos</option><option>Ativo</option><option>Pendente</option></select>
    </div>
  </div>
  <div class="checkbox-row"><span class="cb on"></span> Incluir contas inativas</div>
  <div class="checkbox-row" style="margin-top:8px"><span class="cb"></span> Exibir apenas Wealth</div>
</body></html>
