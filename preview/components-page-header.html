<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
body { padding: 0; background: var(--bg2); }
.hero {
  background: #0f172a; color: #fff; padding: 36px 32px 28px;
  position: relative; overflow: hidden;
}
.hero .wm {
  position: absolute; top: -30px; right: -10px; font-size: 180px;
  font-weight: 900; letter-spacing: -.06em; line-height: .8;
  opacity: .05; pointer-events:none; user-select:none;
}
.hero .eb { display:flex; align-items:center; gap: 10px; }
.hero .stripe { height: 2px; width: 36px; background: var(--gx-primary); }
.hero .eb-text { font-size: 11px; font-weight: 700; letter-spacing:.18em; text-transform: uppercase; color: var(--gx-primary); }
.hero h1 { font-size: 56px; font-weight: 900; line-height: .92; letter-spacing: -0.04em; text-transform: uppercase; margin-top: 12px;}
.hero .sub { font-size:11px; font-weight:700; letter-spacing:.15em; text-transform:uppercase; color: var(--gx-primary); margin-top: 14px;}
</style></head>
<body>
<div class="hero">
  <div class="wm">GXC</div>
  <div class="eb">
    <span class="stripe"></span>
    <span class="eb-text">Page header · disruptive</span>
  </div>
  <h1>Dashboard<br/>Executivo</h1>
  <div class="sub">Visão consolidada de todos os usuários do sistema</div>
</div>
</body></html>
