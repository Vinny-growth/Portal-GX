<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
body { padding: 0; background: var(--bg2); }
.sb {
  display: grid; grid-template-columns: 220px 1fr; height: 320px; overflow: hidden;
}
.side {
  background: linear-gradient(to bottom, var(--gx-primary), var(--gx-primary), var(--gx-primary-dark));
  color: #fff; padding: 16px 0; box-shadow: var(--shadow-elevated);
}
.side .logo { padding: 8px 16px 16px; border-bottom: 1px solid rgba(255,255,255,.2); display:flex; justify-content:center;}
.side .logo img { height: 36px; }
.side .group { padding: 12px 16px 4px; }
.side .group-lbl { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.9); font-weight:700;}
.side .item {
  display:flex; align-items:center; gap: 10px; padding: 8px 16px; font-size: 13px; color: #fff;
  cursor: pointer; transition: var(--transition-smooth);
}
.side .item:hover { background: rgba(255,255,255,.1); transform: translateX(4px); }
.side .item.active {
  background: rgba(255,255,255,.2);
  backdrop-filter: blur(4px);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.2);
  font-weight: 500;
  transform: translateX(4px);
}
.side .ico { width:14px; height:14px; flex-shrink:0; }
.body { background: #fff; padding: 20px; }
.body h2 { font-weight: 900; font-size: 28px; letter-spacing: -0.03em; text-transform: uppercase; line-height: 1; }
.body .eb { font-size:10px; letter-spacing:.14em; font-weight:700; text-transform:uppercase; color:var(--gx-primary); margin-top: 8px;}
</style></head>
<body>
<div class="sb">
  <div class="side">
    <div class="logo"><img src="../assets/logo-app-blue.png" alt=""></div>
    <div class="group"><div class="group-lbl">Módulos Principais</div></div>
    <div class="item active">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-5"/></svg>
      Dashboard
    </div>
    <div class="item">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/></svg>
      CRM
    </div>
    <div class="item">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      Mesa de Operações
    </div>
    <div class="item">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
      Comissionamento
    </div>
    <div class="item">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      Consultor IA
    </div>
  </div>
  <div class="body">
    <div class="eb">Padrão · Sidebar Navy</div>
    <h2 style="margin-top:6px">Layout Shell</h2>
    <p style="font-size:13px; color:var(--fg2); margin-top:8px;">220px expandida, 56px colapsada. Item ativo = bg branco/20 + slide-x. Hover = bg branco/10 + slide-x.</p>
  </div>
</div>
</body></html>
