<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.brand {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 16px;
  align-items: center;
  background: var(--gx-primary-dark);
  padding: 24px;
}
.brand img { width: 100%; height: auto; display: block; }
.brand .meta { color: var(--gx-secondary-light); }
.brand .meta .name { font-size: 22px; font-weight: 900; letter-spacing: -0.02em; color: #fff; }
.brand .meta .tag { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gx-gold); margin-top: 4px;}
.brand .meta .desc { font-size: 12px; line-height: 1.5; color: rgba(255,255,255,.7); margin-top: 12px; max-width: 340px; }
</style></head>
<body style="padding:0; width:700px;">
  <div class="brand">
    <img src="../assets/logo-icon.png" alt="GX Capital app icon">
    <div class="meta">
      <div class="name">GX&nbsp;CAPITAL</div>
      <div class="tag">Wealth · Capital · Nexus</div>
      <div class="desc">Brutalist financial brand. Deep navy and antique gold, sharp 0px corners, mono numerals, uppercase eyebrows.</div>
    </div>
  </div>
</body></html>
