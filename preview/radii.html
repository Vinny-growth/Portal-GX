<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.row-r { display:grid; grid-template-columns: repeat(4, 1fr); gap:12px; }
.tile { background: var(--gx-primary); color:#fff; min-height: 80px; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:6px; padding: 12px; }
.tile .v { font-family: var(--font-mono); font-size:11px; }
.tile .l { font-size:10px; letter-spacing:.1em; text-transform:uppercase; font-weight:700; color: var(--gx-secondary-light); }
.r0 { border-radius: 0; }
.r-pill { border-radius: 9999px; padding: 6px 14px !important; min-height: 0 !important;}
</style></head>
<body>
<div class="eyebrow" style="margin-bottom:10px">Geometry — sharp by default; pills only on legacy badges</div>
<div class="row-r">
  <div class="tile r0"><span class="l">Default</span><span class="v">0px</span></div>
  <div class="tile r0"><span class="l">Card</span><span class="v">0px</span></div>
  <div class="tile r0"><span class="l">Button</span><span class="v">0px</span></div>
  <div class="tile" style="background:var(--gx-secondary-light); color:var(--gx-primary); flex-direction:row; padding:0;">
    <span class="r-pill" style="background:var(--gx-primary); color:#fff; font-size:11px; font-weight:700; letter-spacing:.05em;">PILL · BADGE</span>
  </div>
</div>
</body></html>
