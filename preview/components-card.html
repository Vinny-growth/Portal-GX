<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
body { background: var(--bg2); padding: 16px; }
.card {
  position: relative; background: #fff; border: 1px solid var(--gx-border);
  padding: 20px; transition: var(--transition-smooth);
}
.card::before, .card::after {
  content: ""; position: absolute; width: 12px; height: 12px;
  border-color: var(--gx-primary); transition: var(--transition-smooth);
}
.card::before { top: 0; left: 0; border-top: 2px solid; border-left: 2px solid; }
.card::after { bottom: 0; right: 0; border-bottom: 2px solid; border-right: 2px solid; }
.card.idle::before, .card.idle::after { border-color: transparent; }
.card .head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 12px; }
.card .title { font-weight: 700; font-size: 16px; letter-spacing: -0.01em; }
.card .desc { font-size: 12px; color: var(--fg2); line-height: 1.5; }
.row { display:grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.tag { font-size: 9px; letter-spacing: .14em; font-weight: 700; text-transform: uppercase; color: var(--gx-secondary-dark); }
</style></head>
<body>
<div class="row">
  <div class="card idle">
    <div class="head"><span class="tag">At rest</span></div>
    <div class="title">Mesa de Operações</div>
    <p class="desc">Tech-brackets stay transparent. 1px hairline border. No shadow.</p>
  </div>
  <div class="card" style="box-shadow: 0 0 20px -10px rgba(12,49,99,.3); border-color: rgba(12,49,99,.5);">
    <div class="head"><span class="tag" style="color:var(--gx-primary)">On hover</span></div>
    <div class="title">Mesa de Operações</div>
    <p class="desc">Brackets activate in navy. Soft navy glow appears. Border picks up to 50% navy.</p>
  </div>
</div>
</body></html>
